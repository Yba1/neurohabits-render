services:
  - type: web
    name: neurohabit
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: FEATHERLESS_MODEL
        value: deepseek-ai/DeepSeek-V3-0324
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: EXAVITQu4vr4xnSDxMaL
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DATA_FILE_PATH
        value: /var/data/data.json
    disk:
      name: neurohabit-data
      mountPath: /var/data
      sizeGB: 1
