<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | NeuroHabit</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="glow"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>NeuroHabit Account</h2>

    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button id="signupTab" type="button" onclick="showSignup()" style="flex:1;">Create Account</button>
      <button id="signinTab" type="button" onclick="showSignin()" style="flex:1;">Sign In</button>
    </div>

    <div id="signupSection">
      <input id="signupEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="signupPassword" type="password" placeholder="Password (min 8 chars)" autocomplete="new-password">
      <button onclick="registerAccount()">Create Account & Send Code</button>

      <div id="verifySection" style="display:none; margin-top:12px;">
        <input id="codeInput" type="text" placeholder="Enter 6-digit code" maxlength="6">
        <button onclick="verifySignupCode()">Verify Email</button>
      </div>
    </div>

    <div id="signinSection" style="display:none;">
      <input id="signinEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="signinPassword" type="password" placeholder="Password" autocomplete="current-password">
      <button onclick="signIn()">Sign In</button>
    </div>

    <p id="statusMsg" style="margin-top:12px;color:#9a9a9a;font-size:13px;"></p>
  </div>
</div>

<script>
let pendingEmail = "";

function showSignup() {
  document.getElementById('signupSection').style.display = 'block';
  document.getElementById('signinSection').style.display = 'none';
}

function showSignin() {
  document.getElementById('signupSection').style.display = 'none';
  document.getElementById('signinSection').style.display = 'block';
}

async function registerAccount() {
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const status = document.getElementById('statusMsg');

  if (!email || !password) {
    status.textContent = 'Enter both email and password.';
    return;
  }

  status.textContent = 'Creating account and sending code...';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      status.textContent = data.error || 'Could not create account.';
      return;
    }

    pendingEmail = email;
    document.getElementById('verifySection').style.display = 'block';
    status.textContent = 'Code sent successfully. Enter it below to verify your email.';
  } catch (err) {
    status.textContent = 'Network error while sending code.';
  }
}

async function verifySignupCode() {
  const code = document.getElementById('codeInput').value.trim();
  const status = document.getElementById('statusMsg');

  if (!pendingEmail || !code) {
    status.textContent = 'Enter the verification code sent to your email.';
    return;
  }

  status.textContent = 'Verifying...';

  try {
    const res = await fetch('/api/auth/verify-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: pendingEmail, code })
    });
    const data = await res.json();
    if (!res.ok) {
      status.textContent = data.error || 'Verification failed.';
      return;
    }

    status.textContent = 'Verified. Redirecting...';
    window.location.href = 'dashboard.html';
  } catch (err) {
    status.textContent = 'Network error while verifying.';
  }
}

async function signIn() {
  const email = document.getElementById('signinEmail').value.trim();
  const password = document.getElementById('signinPassword').value;
  const status = document.getElementById('statusMsg');

  if (!email || !password) {
    status.textContent = 'Enter both email and password.';
    return;
  }

  status.textContent = 'Signing in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      status.textContent = data.error || 'Sign in failed.';
      return;
    }

    status.textContent = 'Signed in. Redirecting...';
    window.location.href = 'dashboard.html';
  } catch (err) {
    status.textContent = 'Network error while signing in.';
  }
}
</script>

</body>
</html>
